<app-page-template [displayBackButton]="false">
  <span pageTitle>{{ title() }}</span>

  <section class="hero" aria-label="Browse the tournament">
    <ul class="tile-grid">
      @for (card of cards(); track card.link) {
        <li>
          <a class="tile" [routerLink]="card.link">
            <span class="tile__icon" aria-hidden="true">
              @switch (card.icon) {
                @case ('fixtures') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2" />
                    <path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                }
                @case ('tables') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M5 7h14M5 12h14M5 17h9" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <circle cx="19" cy="17" r="1.4" fill="currentColor" />
                  </svg>
                }
                @case ('teams') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M12 3l7 2.5V11c0 4-3 7.2-7 8-4-.8-7-4-7-8V5.5L12 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                  </svg>
                }
                @case ('users') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <circle cx="10" cy="8" r="3.2" stroke="currentColor" stroke-width="2" />
                    <path d="M3.5 20a6.5 6.5 0 0 1 13 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M17 5.2a3.2 3.2 0 0 1 0 6M20.5 20a6.5 6.5 0 0 0-3.2-5.6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                }
                @case ('groups') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2" />
                    <rect x="13" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2" />
                    <rect x="13" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2" />
                  </svg>
                }
                @case ('rules') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="2" />
                    <path d="M9 8h6M9 12h6M9 16h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                }
                @case ('profile') {
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" />
                    <path d="M4 20a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                }
              }
            </span>
            <span class="tile__label">{{ card.label }}</span>
          </a>
        </li>
      }
    </ul>
  </section>

  <div class="dashboard-actions">
    @if (isAuthenticated()) {
      <button type="button" class="btn btn-accent" routerLink="/admin/teams/create">Register a team</button>
      <button type="button" class="btn btn-surface" routerLink="/admin/teams">Manage my teams</button>
    } @else {
      <button type="button" class="btn btn-accent" routerLink="/register">Register</button>
      <button type="button" class="btn btn-surface" routerLink="/login">Sign In</button>
    }
  </div>
</app-page-template>
