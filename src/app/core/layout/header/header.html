<header class="header">
  <div class="header-side">
    @if (showMenu()) {
      <button
        type="button"
        class="icon-btn menu-btn"
        aria-label="Toggle navigation menu"
        [attr.aria-expanded]="sidebar.isOpen()"
        (click)="sidebar.toggle()"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    }
    <a class="brand" [routerLink]="paths.ROOT">supa-touch</a>
  </div>

  <div class="header-side header-end">
    <button
      type="button"
      class="icon-btn"
      [attr.aria-pressed]="theme.mode() === 'light'"
      [attr.aria-label]="theme.mode() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      (click)="theme.toggle()"
    >
      @if (theme.mode() === 'dark') {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        </svg>
      }
    </button>

    @if (isAuthenticated()) {
      <span class="user-email">{{ user()?.email }}</span>
      <button type="button" class="text-btn" (click)="logout()">Log out</button>
    } @else {
      <a class="text-btn" [routerLink]="loginLink">Sign in</a>
    }
  </div>
</header>
