<div class="backdrop" aria-hidden="true" (click)="state.close()"></div>

<nav
  #panel
  class="sidebar-panel"
  tabindex="-1"
  aria-label="Admin navigation"
  [attr.role]="breakpoint.isDesktop() ? null : 'dialog'"
  [attr.aria-modal]="breakpoint.isDesktop() ? null : 'true'"
>
  <div class="panel-head">
    <span class="panel-title">Menu</span>
    <button type="button" class="close-btn" aria-label="Close navigation" (click)="state.close()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <ul class="nav-list">
    <li>
      <a
        [routerLink]="adminLink"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Dashboard
      </a>
    </li>
  </ul>
</nav>
